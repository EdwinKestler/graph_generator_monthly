name: Build Windows EXE

# Triggers:
#   • Push to main            → builds exe, uploads as workflow artifact (no release)
#   • Push a vX.Y.Z tag       → builds exe, creates GitHub Release with exe attached
#   • Manual dispatch         → ad-hoc build; uploads artifact, no release
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # required by softprops/action-gh-release to create releases

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        # bash -el: login shell so conda init runs; -e exits on error
        shell: bash -el {0}

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python / conda ───────────────────────────────────────────────────
      - name: Set up conda environment (conda-forge · Python 3.11)
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          channels: conda-forge,defaults
          channel-priority: strict
          activate-environment: graph_generator
          environment-file: environment.yml

      # ── 3. Smoke tests ──────────────────────────────────────────────────────
      # Tests 2 and 4 require a pre-downloaded CSV (gitignored) and will fail
      # on a clean checkout — that is expected.  Tests 1, 3, and 5 run fully.
      # continue-on-error keeps the build going regardless.
      - name: Run test suite
        continue-on-error: true
        run: python dev/test_suite.py

      # ── 4. Build ─────────────────────────────────────────────────────────────
      # The spec uses upx=True; UPX is not on the runner PATH so PyInstaller
      # skips compression silently — the exe is produced either way.
      - name: Build EXE with PyInstaller
        run: pyinstaller generador_graficos_mensual.spec

      # ── 5. Artifact (all triggers) ───────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: generador_graficos_mensual-windows-${{ github.sha }}
          path: dist/generador_graficos_mensual.exe
          if-no-files-found: error
          retention-days: 30

      # ── 6. GitHub Release (tag pushes only) ──────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/generador_graficos_mensual.exe
          generate_release_notes: true
